<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="버저">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>버저 — 수학여행 호출 앱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@700&display=swap');
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#252525;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);--tx:#f0f0f0;--tx2:#888;--tx3:#444;--red:#ff3b3b;--blue:#3b82ff;--green:#22c55e;--r:12px;--rsm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}
.sc{display:none;flex-direction:column;height:100%;}
.sc.on{display:flex;}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem 1rem 1.5rem;}
.scr::-webkit-scrollbar{display:none;}
.tbar{display:flex;border-top:0.5px solid var(--bdr);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.tbtn{flex:1;padding:10px 0 8px;border:none;background:none;color:var(--tx2);font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
.tbtn.on{color:var(--tx);}
.tbtn svg{width:20px;height:20px;}
.h2{font-size:18px;font-weight:700;}
.sub{font-size:13px;color:var(--tx2);line-height:1.7;}
.lbl{font-size:11px;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;margin:1rem 0 6px;font-weight:500;}
input[type=text],input[type=password]{width:100%;padding:13px 14px;border:.5px solid var(--bdr2);border-radius:var(--rsm);font-size:15px;background:var(--bg2);color:var(--tx);outline:none;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px;transition:border-color .15s;}
input:focus{border-color:var(--blue);}
.btn{display:block;width:100%;padding:13px;border-radius:var(--r);border:.5px solid var(--bdr2);font-size:15px;font-weight:500;cursor:pointer;text-align:center;background:var(--bg2);color:var(--tx);margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;}
.btn:active{opacity:.65;}
.btn-p{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.btn-r{background:var(--red);color:#fff;border-color:var(--red);font-size:17px;padding:20px;border-radius:var(--r);display:block;width:100%;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;margin-bottom:10px;}
.btn-b{background:var(--blue);color:#fff;border-color:var(--blue);font-size:17px;padding:20px;border-radius:var(--r);display:block;width:100%;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
.btn-r:active,.btn-b:active{opacity:.75;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.chip{padding:7px 14px;border-radius:20px;border:.5px solid var(--bdr2);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--tx2);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.chip.on{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:500;}
.card{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:12px;}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg3);border-radius:var(--rsm);padding:10px 8px;text-align:center;}
.stn{font-size:24px;font-weight:700;font-family:'Space Mono',monospace;}
.stl{font-size:11px;color:var(--tx2);margin-top:2px;}
.tbig{font-size:54px;font-weight:700;font-family:'Space Mono',monospace;text-align:center;letter-spacing:.04em;padding:.75rem 0 .25rem;}
.pbg{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:8px 0 12px;}
.pb{height:4px;border-radius:2px;transition:width .5s linear,background .3s;}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:.5px solid var(--bdr);}
.mrow:last-child{border-bottom:none;}
.ava{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.bdg{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;}
.bdg-h{background:rgba(59,130,255,.15);color:#60a5fa;}
.bdg-on{background:rgba(34,197,94,.15);color:#4ade80;}
.bdg-off{background:var(--bg3);color:var(--tx3);}
.hrow{display:flex;gap:10px;padding:11px 0;border-bottom:.5px solid var(--bdr);align-items:flex-start;}
.hrow:last-child{border-bottom:none;}
.hdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
#notif{display:none;position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center;padding:1.5rem;}
.nbox{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:20px;padding:2rem 1.5rem;text-align:center;width:100%;max-width:320px;}
@keyframes ring{0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(-22deg) scale(1.12)}40%{transform:rotate(22deg) scale(1.12)}60%{transform:rotate(-13deg)}80%{transform:rotate(13deg)}}
.ring{animation:ring .65s ease;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 1.8s infinite;}
.back{background:none;border:none;color:var(--tx2);font-size:14px;cursor:pointer;padding:0;font-family:'Noto Sans KR',sans-serif;margin-bottom:1.25rem;}
.ibox{border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.75;}
.ibox-b{background:rgba(59,130,255,.08);border:.5px solid rgba(59,130,255,.2);color:#93c5fd;}
.ibox-y{background:rgba(245,158,11,.08);border:.5px solid rgba(245,158,11,.2);color:#fcd34d;}
.code-share{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;font-family:'Space Mono',monospace;font-size:13px;word-break:break-all;color:var(--tx);cursor:pointer;margin-bottom:6px;border:.5px solid var(--bdr2);}
.cbdg{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;}
.cbdg-ok{background:rgba(34,197,94,.12);color:#4ade80;}
.cbdg-ing{background:rgba(245,158,11,.12);color:#fbbf24;}
.cbdg-no{background:rgba(255,59,59,.12);color:#ff6b6b;}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="sc on">
  <div class="scr" style="display:flex;flex-direction:column;justify-content:center;min-height:100%;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:68px;margin-bottom:10px;">📣</div>
      <div style="font-size:28px;font-weight:700;letter-spacing:-.02em;">버저</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:5px;">수학여행 실시간 호출 앱</div>
    </div>
    <button class="btn btn-p" onclick="go('s-create')">🎓 방 만들기 (선생님 / 조장)</button>
    <button class="btn" onclick="go('s-join')">👋 코드로 참여하기 (학생)</button>
    <div class="card" style="margin-top:.5rem;">
      <div class="sub" style="line-height:2;">
        ⚡ 버저 누르면 모든 폰에 즉시 알림<br>
        📵 화면 꺼진 상태에서도 알림<br>
        📲 링크만 열면 됨 — 설치 불필요<br>
        🔑 선생님만 방 만들기 — 학생은 코드만
      </div>
    </div>
  </div>
</div>

<!-- CREATE -->
<div id="s-create" class="sc">
  <div class="scr">
    <button class="back" onclick="go('s-home')">← 뒤로</button>
    <div class="h2" style="margin-bottom:4px;">방 만들기</div>
    <div class="sub" style="margin-bottom:1.25rem;">선생님 또는 조장</div>
    <div class="lbl">내 이름</div>
    <input type="text" id="c-uname" placeholder="예: 김선생님">
    <div class="lbl">방 이름</div>
    <input type="text" id="c-rname" value="2학년 3반 수학여행">
    <div class="lbl">조 구성</div>
    <div class="chips" id="setup-groups">
      <button class="chip on" onclick="this.classList.toggle('on')">1조</button>
      <button class="chip on" onclick="this.classList.toggle('on')">2조</button>
      <button class="chip on" onclick="this.classList.toggle('on')">3조</button>
      <button class="chip on" onclick="this.classList.toggle('on')">4조</button>
      <button class="chip on" onclick="this.classList.toggle('on')">5조</button>
      <button class="chip" onclick="this.classList.toggle('on')">6조</button>
      <button class="chip" onclick="this.classList.toggle('on')">7조</button>
      <button class="chip" onclick="this.classList.toggle('on')">8조</button>
    </div>
    <button class="btn btn-p" style="margin-top:.75rem;" onclick="createRoom()">방 만들기</button>
  </div>
</div>

<!-- JOIN -->
<div id="s-join" class="sc">
  <div class="scr">
    <button class="back" onclick="go('s-home')">← 뒤로</button>
    <div class="h2" style="margin-bottom:4px;">방 참여하기</div>
    <div class="sub" style="margin-bottom:1.25rem;">선생님에게 받은 코드 입력</div>
    <div class="lbl">참여 코드</div>
    <input type="text" id="j-code" placeholder="선생님에게 받은 코드" style="text-align:center;font-size:18px;letter-spacing:.05em;">
    <div class="lbl">내 이름</div>
    <input type="text" id="j-name" placeholder="이름을 입력하세요">
    <div class="lbl">내 조</div>
    <div class="chips" id="j-grp">
      <button class="chip on" onclick="pickJG(this)">1조</button>
      <button class="chip" onclick="pickJG(this)">2조</button>
      <button class="chip" onclick="pickJG(this)">3조</button>
      <button class="chip" onclick="pickJG(this)">4조</button>
      <button class="chip" onclick="pickJG(this)">5조</button>
    </div>
    <button class="btn btn-p" style="margin-top:.75rem;" onclick="joinRoom()">참여하기</button>
  </div>
</div>

<!-- ROOM -->
<div id="s-room" class="sc">
  <div id="room-body" style="flex:1;min-height:0;display:flex;flex-direction:column;"></div>
  <div class="tbar">
    <button class="tbtn on" id="t-buzz" onclick="tab('buzz')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>호출
    </button>
    <button class="tbtn" id="t-members" onclick="tab('members')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>멤버
    </button>
    <button class="tbtn" id="t-history" onclick="tab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>기록
    </button>
    <button class="tbtn" id="t-guide" onclick="tab('guide')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>안내
    </button>
  </div>
</div>

<!-- NOTIF -->
<div id="notif">
  <div class="nbox">
    <div id="n-icon" style="font-size:62px;margin-bottom:14px;">📣</div>
    <div id="n-title" style="font-size:22px;font-weight:700;margin-bottom:8px;"></div>
    <div id="n-msg" style="font-size:15px;color:var(--tx2);line-height:1.7;margin-bottom:1.5rem;"></div>
    <button class="btn btn-p" style="margin:0;" onclick="closeNotif()">확인</button>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>

const FIREBASE_URL = 'https://buzzer-a105c-default-rtdb.firebaseio.com';

firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();

const S = {
  tab:'buzz', groups:['1조','2조','3조','4조','5조'],
  selGroup:'1조', joinGroup:'1조',
  roomName:'', userName:'', roomCode:'', shareCode:'',
  isHost:false,
  timerSec:300, totalSec:300, timerRunning:false, timerTick:null,
  members:{}, history:[], buzzUnsub:null, memberUnsub:null, swReg:null,
};

// SW 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(r => { S.swReg = r; }).catch(()=>{});
}

// 백그라운드 복귀 시 자동 재접속
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && S.roomCode && !S.ably) {
    // Firebase 재연결
    db.goOnline();
    db.ref('rooms/' + S.roomCode + '/members/' + S.userName).set({
      group: S.isHost ? '전체' : S.selGroup,
      role: S.isHost ? 'host' : 'member',
      online: true
    });
  }
});

// 세션 복원 시도
try {
  const saved = sessionStorage.getItem('buzzer_session');
  if (saved) {
    const sess = JSON.parse(saved);
    Object.assign(S, sess);
    // 홈 화면 추가 앱으로 재진입 시 자동 복원
    if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
      setTimeout(() => {
        if (sess.roomCode && sess.userName) {
          enterRoom();
        }
      }, 500);
    }
  }
} catch(e) {}

const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

function go(id) {
  document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function pickJG(btn) {
  document.querySelectorAll('#j-grp .chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  S.joinGroup = btn.textContent;
}
window.pickJG = pickJG;

function createRoom() {
  const name = document.getElementById('c-uname').value.trim();
  if (!name) { alert('이름을 입력해주세요'); return; }
  S.userName = name;
  S.roomName = document.getElementById('c-rname').value || '수학여행 방';
  S.groups = [...document.querySelectorAll('#setup-groups .chip.on')].map(b => b.textContent);
  if (!S.groups.length) S.groups = ['1조','2조','3조'];
  S.selGroup = S.groups[0];
  S.roomCode = Math.random().toString(36).substring(2,8).toUpperCase();
  S.shareCode = S.roomCode;
  S.isHost = true;

  // Firebase에 방 정보 저장
  db.ref('rooms/' + S.roomCode + '/info').set({
    name: S.roomName,
    groups: S.groups,
    host: S.userName,
    created: firebase.database.ServerValue.TIMESTAMP,
  });

  enterRoom();
}
window.createRoom = createRoom;

function joinRoom() {
  const code = document.getElementById('j-code').value.trim().toUpperCase();
  if (!code) { alert('참여 코드를 입력해주세요'); return; }
  const name = document.getElementById('j-name').value.trim();
  if (!name) { alert('이름을 입력해주세요'); return; }
  S.roomCode = code;
  S.userName = name;
  S.selGroup = S.joinGroup;
  S.isHost = false;

  // 방 존재 확인
  db.ref('rooms/' + code + '/info').on("value", snap => {
    if (!snap.exists()) { alert('존재하지 않는 코드예요. 선생님에게 다시 확인해주세요.'); return; }
    const info = snap.val();
    S.roomName = info.name || '수학여행 방';
    S.groups = info.groups || ['1조','2조','3조','4조','5조'];
    enterRoom();
  }, { onlyOnce: true });
}
window.joinRoom = joinRoom;

function enterRoom() {
  // 멤버 등록
  db.ref('rooms/' + S.roomCode + '/members/' + S.userName).set({ group: S.isHost ? '전체' : S.selGroup, role: S.isHost ? 'host' : 'member', online: true });

  // 멤버 리스닝
  S.memberUnsub = db.ref('rooms/' + S.roomCode + '/members').on("value", snap => {
    S.members = snap.val() || {};
    if (S.tab === 'members') tab('members');
    const body = document.getElementById('room-body');
    if (body && S.tab === 'buzz') {
      const el = document.getElementById('online-count');
      if (el) el.textContent = Object.values(S.members).filter(m=>m.online).length + '명 접속';
    }
  });

  // 버저 리스닝
  S.buzzUnsub = db.ref('rooms/' + S.roomCode + '/buzz').on("value", snap => {
    if (!snap.exists()) return;
    const d = snap.val();
    if (!d.id) return;
    if (d.id === S.lastBuzzId) return;
    S.lastBuzzId = d.id;
    if (S.isHost) return;
    if (d.target === '전체' || d.target === S.selGroup) {
      S.history.unshift({type: d.target==='전체'?'all':'group', target:d.target, msg:d.msg, time:nowStr()});
      fireNotif(d.target==='전체'?'📣':'🔔', d.target+' 집합!', d.msg);
    }
  });

  go('s-room');
  tab('buzz');
  initNotif();
  keepAwake();
}

function sendBuzz(target, msg) {
  const id = Date.now().toString(36);
  db.ref('rooms/' + S.roomCode + '/buzz').set({ id, target, msg, time: firebase.database.ServerValue.TIMESTAMP });
  S.history.unshift({type:target==='전체'?'all':'group', target, msg, time:nowStr()});
  showNotif(target==='전체'?'📣':'🔔', target+' 호출 발송!', msg);
}
window.sendBuzz = sendBuzz;

// 알림
async function initNotif() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') await Notification.requestPermission();
}

function fireNotif(icon, title, msg) {
  showNotif(icon, title, msg);
  if (S.swReg && Notification.permission === 'granted') {
    try {
      S.swReg.showNotification(title, {
        body: msg, vibrate:[300,100,300,100,300],
        requireInteraction:true, tag:'buzz-'+Date.now(), renotify:true,
      });
    } catch(e){}
  }
  beep();
}

function showNotif(icon, title, msg) {
  document.getElementById('n-icon').textContent = icon;
  document.getElementById('n-title').textContent = title;
  document.getElementById('n-msg').textContent = msg;
  document.getElementById('notif').style.display = 'flex';
  const ic = document.getElementById('n-icon');
  ic.classList.remove('ring'); void ic.offsetWidth; ic.classList.add('ring');
}

function closeNotif() {
  document.getElementById('notif').style.display = 'none';
  tab(S.tab);
}
window.closeNotif = closeNotif;

function beep() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(1047,t); osc.frequency.setValueAtTime(784,t+.1);
    osc.frequency.setValueAtTime(1047,t+.2); osc.frequency.setValueAtTime(1319,t+.3);
    g.gain.setValueAtTime(.28,t); g.gain.exponentialRampToValueAtTime(.001,t+.8);
    osc.start(t); osc.stop(t+.8);
  } catch(e){}
}

// Wake Lock
let wakeLock = null;
async function keepAwake() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  }
}
document.addEventListener('visibilitychange', async () => { if (!document.hidden && !wakeLock) await keepAwake(); });

// Timer
function setTimerSec(s) { stopTimer(); S.timerSec=s; S.totalSec=s; updTimer(); }
function startTimer() {
  if (S.timerRunning) return;
  if (S.timerSec<=0) S.timerSec=S.totalSec;
  S.timerRunning=true; updTimer();
  S.timerTick = setInterval(()=>{
    S.timerSec--;
    updTimer();
    if (S.timerSec<=0) {
      stopTimer();
      db.ref('rooms/'+S.roomCode+'/buzz').set({id:Date.now().toString(36),target:'전체',msg:'⏰ 집합 시간이 끝났어요!',time:firebase.database.ServerValue.TIMESTAMP});
      showNotif('⏰','시간 종료!','집합 시간이 끝났어요');
    }
  },1000);
}
function stopTimer() { if(S.timerTick){clearInterval(S.timerTick);S.timerTick=null;} S.timerRunning=false; updTimer(); }
function resetTimer() { stopTimer(); S.timerSec=S.totalSec; updTimer(); }
function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function updTimer() {
  const d=document.getElementById('td'),p=document.getElementById('tp'),l=document.getElementById('tl');
  if(d) d.textContent=fmt(S.timerSec);
  if(p){p.style.width=Math.round(S.timerSec/S.totalSec*100)+'%';p.style.background=S.timerSec<=60?'var(--red)':'var(--blue)';}
  if(l) l.textContent=S.timerRunning?'⏱ 카운트다운 중...':'시간 선택 후 시작';
}
function nowStr(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
window.setTimerSec=setTimerSec; window.startTimer=startTimer; window.stopTimer=stopTimer; window.resetTimer=resetTimer;

// Tabs
function tab(t) {
  S.tab=t;
  ['buzz','members','history','guide'].forEach(x=>document.getElementById('t-'+x).classList.toggle('on',x===t));
  const body=document.getElementById('room-body');
  if(t==='buzz') renderBuzz(body);
  else if(t==='members') renderMembers(body);
  else if(t==='history') renderHistory(body);
  else renderGuide(body);
}
window.tab=tab;

function copyCode() {
  navigator.clipboard.writeText(S.shareCode).then(()=>{
    alert('코드 복사됨! 카카오톡으로 학생들에게 보내주세요 😊');
  }).catch(()=>{ prompt('코드를 복사해서 학생들에게 보내주세요:', S.shareCode); });
}
window.copyCode=copyCode;

function pickBG(btn,g) {
  S.selGroup=g;
  document.querySelectorAll('#bgrp .chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const b=document.getElementById('gbtn');
  if(b) b.textContent='🔔  '+g+' 호출 버저';
}
window.pickBG=pickBG;

function doBuzz(type) {
  const msg=document.getElementById('bmsg')?.value||'모여주세요';
  sendBuzz(type==='all'?'전체':S.selGroup, msg);
}
window.doBuzz=doBuzz;

function renderBuzz(el) {
  const members = Object.values(S.members);
  const online = members.filter(m=>m.online).length;
  el.innerHTML=`
<div class="scr">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
    <div>
      <div style="font-size:15px;font-weight:700;">${S.roomName}</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:2px;" id="online-count">${online}명 접속</div>
    </div>
    <span class="cbdg cbdg-ok"><span class="pulse" style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;"></span> 실시간</span>
  </div>

  ${S.isHost ? `
  <div class="lbl">학생 참여 코드</div>
  <div class="code-share" onclick="copyCode()">
    ${S.shareCode} &nbsp;📋 탭해서 복사
  </div>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:12px;">이 코드를 카카오톡으로 학생들에게 보내주세요</div>
  ` : ''}

  <div class="stats">
    <div class="stat"><div class="stn">${members.length}</div><div class="stl">전체 멤버</div></div>
    <div class="stat"><div class="stn">${online}</div><div class="stl">접속 중</div></div>
    <div class="stat"><div class="stn">${S.history.length}</div><div class="stl">호출 횟수</div></div>
  </div>

  <div class="lbl">집합 타이머</div>
  <div class="card">
    <div class="tbig" id="td">${fmt(S.timerSec)}</div>
    <div class="pbg"><div class="pb" id="tp" style="width:${Math.round(S.timerSec/S.totalSec*100)}%;background:var(--blue);"></div></div>
    <div style="font-size:12px;color:var(--tx2);text-align:center;margin-bottom:10px;" id="tl">시간 선택 후 시작</div>
    <div class="chips" style="margin-bottom:8px;">
      <button class="chip" onclick="setTimerSec(180)">3분</button>
      <button class="chip" onclick="setTimerSec(300)">5분</button>
      <button class="chip" onclick="setTimerSec(600)">10분</button>
      <button class="chip" onclick="setTimerSec(900)">15분</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn" style="margin:0;flex:1;padding:11px;" onclick="startTimer()">▶ 시작</button>
      <button class="btn" style="margin:0;flex:1;padding:11px;" onclick="stopTimer()">■ 정지</button>
      <button class="btn" style="margin:0;flex:1;padding:11px;" onclick="resetTimer()">↺ 리셋</button>
    </div>
  </div>

  <div class="lbl">전체 호출</div>
  <button class="btn-r" onclick="doBuzz('all')">📣  전체 집합 버저</button>

  <div class="lbl">조별 호출</div>
  <div class="chips" id="bgrp">
    ${S.groups.map((g,i)=>`<button class="chip ${i===0?'on':''}" onclick="pickBG(this,'${g}')">${g}</button>`).join('')}
  </div>
  <input type="text" id="bmsg" placeholder="호출 메시지 (예: 사진 스팟 발견!)" value="지금 바로 모여주세요 🙋" style="margin-top:4px;">
  <button class="btn-b" id="gbtn" onclick="doBuzz('group')">🔔  ${S.selGroup} 호출 버저</button>
</div>`;
}

function renderMembers(el) {
  const members = Object.entries(S.members);
  el.innerHTML=`<div class="scr">
    <div class="h2" style="margin-bottom:1rem;">멤버 ${members.length}명</div>
    ${members.length===0?'<div style="text-align:center;color:var(--tx2);padding:3rem 0;">아직 아무도 없어요</div>':
    members.map(([name,m])=>`
    <div class="mrow">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="ava">${name[0]}</div>
        <div><div style="font-size:14px;font-weight:500;">${name}</div><div style="font-size:12px;color:var(--tx2);">${m.group||''}</div></div>
      </div>
      <div style="display:flex;gap:5px;">
        ${m.role==='host'?'<span class="bdg bdg-h">방장</span>':''}
        <span class="bdg ${m.online?'bdg-on':'bdg-off'}">${m.online?'접속 중':'오프라인'}</span>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderHistory(el) {
  el.innerHTML=`<div class="scr">
    <div class="h2" style="margin-bottom:1rem;">호출 기록 ${S.history.length}건</div>
    ${S.history.length===0
      ?'<div style="text-align:center;color:var(--tx2);padding:4rem 0;font-size:14px;">아직 호출 기록이 없어요</div>'
      :S.history.map(h=>`
    <div class="hrow">
      <div class="hdot" style="background:${h.type==='all'?'var(--red)':'var(--blue)'};"></div>
      <div><div style="font-size:14px;"><strong>${h.target}</strong> · ${h.msg}</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:2px;">${h.time}</div></div>
    </div>`).join('')}
  </div>`;
}

function renderGuide(el) {
  el.innerHTML=`<div class="scr">
    <div class="h2" style="margin-bottom:1.25rem;">사용 안내</div>

    ${S.isHost ? `
    <div class="lbl">선생님 / 조장</div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">📋 사용 방법</div>
      <div style="font-size:13px;color:var(--tx2);line-height:2;">
        1. 방 만들기 → 이름, 조 설정<br>
        2. 생성된 <strong style="color:var(--tx);">참여 코드</strong> 탭해서 복사<br>
        3. 카카오톡으로 학생들에게 전송<br>
        4. 빨간 버저 = 전체 호출<br>
        5. 파란 버저 = 조별 호출<br>
        6. 타이머 = 자유시간 종료 알림
      </div>
    </div>
    ` : `
    <div class="lbl">학생</div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">📋 사용 방법</div>
      <div style="font-size:13px;color:var(--tx2);line-height:2;">
        1. 선생님에게 링크와 코드 받기<br>
        2. 코드로 참여하기 → 코드, 이름, 내 조 입력<br>
        3. <strong style="color:var(--tx);">알림 허용</strong> 반드시 탭!<br>
        4. 홈 화면에 추가 (아래 참고)
      </div>
    </div>
    `}

    <div class="lbl">화면 꺼져도 알림 받기</div>
    <div class="ibox ibox-y">⚡ 홈 화면에 추가해야 화면이 꺼져도 알림이 울려요!</div>

    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">📱 아이폰 (iOS)</div>
      <div style="font-size:13px;color:var(--tx2);line-height:2;">
        1. <strong style="color:var(--tx);">Safari</strong>로 열기 (Chrome 아님!)<br>
        2. 하단 공유 버튼 탭 (□↑)<br>
        3. <strong style="color:var(--tx);">홈 화면에 추가</strong> 탭<br>
        4. 추가 탭<br>
        5. 홈 화면 버저 아이콘으로 열기
      </div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">🤖 안드로이드</div>
      <div style="font-size:13px;color:var(--tx2);line-height:2;">
        1. <strong style="color:var(--tx);">Chrome</strong>으로 열기<br>
        2. 우상단 점 세 개(⋮) 탭<br>
        3. <strong style="color:var(--tx);">홈 화면에 추가</strong> 탭<br>
        4. 추가 탭<br>
        5. 홈 화면 버저 아이콘으로 열기
      </div>
    </div>

    <div class="ibox ibox-b" style="margin-top:4px;">
      💡 알림이 안 와요? 설정 → 알림 → Safari/Chrome → 버저 → 허용
    </div>
    <div style="height:1rem;"></div>
  </div>`;
}
</script>
</body>
</html>
